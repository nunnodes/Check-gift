<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Giveaway Item Tracker</title>
    <style>
        :root {
            --bg-color: #121214;
            --card-bg: #1a1a1e;
            --text-color: #e4e4e7;
            --text-muted: #a1a1aa;
            --accent-color: #3b82f6;
            --danger-color: #ef4444;
            --border-color: #2d2d34;
        }

        body {
            font-family: system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            margin: 0;
            padding: 2rem 1rem;
            display: flex;
            justify-content: center;
        }

        .container {
            width: 100%;
            max-width: 480px;
            background: var(--card-bg);
            padding: 2rem;
            border-radius: 12px;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.4);
            border: 1px solid var(--border-color);
        }

        h1 {
            font-size: 1.5rem;
            margin-top: 0;
            margin-bottom: 1.5rem;
            text-align: center;
            letter-spacing: 0.5px;
        }

        .item-list {
            display: flex;
            flex-direction: column;
            gap: 1rem;
            margin-bottom: 2rem;
        }

        .item-row {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0.75rem 1rem;
            background: rgba(255, 255, 255, 0.02);
            border: 1px solid var(--border-color);
            border-radius: 8px;
        }

        .item-name {
            font-size: 1.1rem;
            font-weight: 500;
            text-transform: capitalize;
        }

        .controls {
            display: flex;
            align-items: center;
            gap: 1rem;
        }

        .counter-btn {
            width: 36px;
            height: 36px;
            border-radius: 6px;
            border: none;
            background-color: var(--border-color);
            color: var(--text-color);
            font-size: 1.2rem;
            font-weight: bold;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: background 0.2s;
        }

        .counter-btn:hover {
            background-color: #3f3f46;
        }

        .counter-btn:active {
            transform: scale(0.95);
        }

        .count-display {
            font-size: 1.2rem;
            font-weight: 600;
            min-width: 2rem;
            text-align: center;
        }

        .reset-container {
            display: flex;
            justify-content: center;
        }

        .reset-btn {
            width: 100%;
            padding: 0.75rem;
            border-radius: 8px;
            border: 1px solid var(--danger-color);
            background: transparent;
            color: var(--danger-color);
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
        }

        .reset-btn:hover {
            background: var(--danger-color);
            color: white;
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>Giveaway Tracker</h1>
        
        <div class="item-list" id="itemList">
            <!-- Items will be injected here by JavaScript -->
        </div>

        <div class="reset-container">
            <button class="reset-btn" onclick="resetAll()">Reset All Counts</button>
        </div>
    </div>

    <script>
        // Item configuration (typo in umbrella preserved per request, can be changed easily)
        const items = ['umbera', 'cup', 'coupon', 'Painting'];
        
        // Initialize counts from localStorage or default to 0
        let counts = JSON.parse(localStorage.getItem('giveaway_counts')) || {};
        
        // Ensure all configured items exist in the counts object
        items.forEach(item => {
            if (counts[item] === undefined) {
                counts[item] = 0;
            }
        });

        // Function to render the UI elements
        function renderItems() {
            const listContainer = document.getElementById('itemList');
            listContainer.innerHTML = '';

            items.forEach(item => {
                const row = document.createElement('div');
                row.className = 'item-row';
                
                row.innerHTML = `
                    <span class="item-name">${item}</span>
                    <div class="controls">
                        <button class="counter-btn" onclick="updateCount('${item}', -1)">-</button>
                        <span class="count-display" id="count-${item}">${counts[item]}</span>
                        <button class="counter-btn" onclick="updateCount('${item}', 1)">+</button>
                    </div>
                `;
                listContainer.appendChild(row);
            });
        }

        // Function to handle increment/decrement
        function updateCount(item, change) {
            // Prevent numbers from going below 0
            if (counts[item] + change >= 0) {
                counts[item] += change;
                saveAndRefresh(item);
            }
        }

        // Function to reset all tallies
        function resetAll() {
            if (confirm('Are you sure you want to reset all counts to 0?')) {
                items.forEach(item => counts[item] = 0);
                localStorage.setItem('giveaway_counts', JSON.stringify(counts));
                renderItems();
            }
        }

        // Save current state to localStorage and update specific display
        function saveAndRefresh(item) {
            localStorage.setItem('giveaway_counts', JSON.stringify(counts));
            document.getElementById(`count-${item}`).textContent = counts[item];
        }

        // Initial setup run
        renderItems();
    </script>
</body>
</html>
